      .container {
        display: flex;
        flex-flow: row wrap;

      .grid-container {
        display: grid;
        grid-template-columns: 3fr 1fr 3fr 1fr;

        gap: 4px;
      }

      .box {

        justify-content: center;

        height: 80px;
        background-color: #333;
        color: white;
      }

    </style>
