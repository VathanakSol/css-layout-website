<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query - CSS</title>
    <!-- Internal CSS -->
    <style>
        /* min = minimum */
        /* max = maximum */

        .box {
            width: 100px;
            height: 100px;
            background-color: lightcoral;
            padding: 12px 18px;
        }
        .container {
            display: flex;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        @media (min-width: 300px) and (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 500px) {
            .container {
                flex-direction: column;
            }
            .box {
                background-color: red;
            }
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: lightcoral;
            padding: 12px 18px;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 16px;
        }

        @media (max-width: 350px) {
            button {
                display: none;
            }

            h1 {
                font-size: 16px;
            }
        }

        /* height > width */
        @media (orientation: portrait) {
            body {
                background-color: yellow;
            }
            p {
                text-align: center;
            }
        }
        /* width > height */
        @media screen and (orientation: landscape) {
            body {
                background-color: orange;
            }
        }

        img {
            width: 300px;
            height: 210px;
        }

        p {
            float: left;
        }

        img {
            float: right;
            clear: both;
        }
        
    </style>
</head>
<body>
